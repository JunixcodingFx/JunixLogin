

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youname | JunixLogin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920') no-repeat center/cover;
    }
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }
    .login-box {
      position: relative;
      width: 90%;
      max-width: 360px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      color: white;
      animation: fadeIn 1s ease;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      color: white;
      outline: none;
    }
    input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to right, #8b5cf6, #ec4899);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
    }


    .footer a {
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .footer a:hover {
      color: #ff7ad9;
      text-shadow: 0 0 8px rgba(255, 122, 217, 0.8), 0 0 15px rgba(255, 122, 217, 0.6);
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);} 
      to {opacity: 1; transform: translateY(0);} 
    }

    @media (max-width: 500px) {
      .login-box {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">
  <h2>Welcome Back ✨</h2>

  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">

  wollen sie registrieren? <a href="Register.html" style="color: #ff7ad9; text-decoration: none;">Hier klicken</a>

  <button>Login</button>
</div>

<div class="footer">
  Template by <a href="https://github.com/JunixcodingFx" target="_blank">JunixcodingFx</a>
</div>

</body>
